services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: toilet-backend
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/app.db
      TOILET_CSV_PATH: /app/backend/data/data.csv
      BACKEND_CORS_ORIGINS: http://localhost:8501,http://127.0.0.1:8501
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: toilet-frontend
    env_file:
      - .env
    environment:
      BACKEND_API_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

volumes:
  backend-data:
